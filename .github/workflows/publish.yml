name: Publish Tool

permissions:
  contents: read
  id-token: write

on:
  push:
    tags:
      - "v*"

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Get version from tag
        id: tag_name
        run: echo "current_version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Validate version consistency
        run: |
          TAG_VERSION="${{ steps.tag_name.outputs.current_version }}"
          CSPROJ_VERSION=$(grep -oP '(?<=<Version>)[^<]+' dotnet-replay.csproj)
          
          if [ "$TAG_VERSION" != "$CSPROJ_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match csproj version ($CSPROJ_VERSION)"
            exit 1
          fi
          
          echo "All versions match tag: ${TAG_VERSION}"

      - name: Pack
        run: dotnet pack dotnet-replay.csproj -c Release -o nupkg /p:Version=${{ steps.tag_name.outputs.current_version }}

      - name: NuGet login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push "nupkg/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --skip-duplicate
